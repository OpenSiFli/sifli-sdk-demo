# This repo has no build jobs; CI exists only to sync GitLab -> GitHub.
# A pipeline is created on every push to main, and on manual web runs.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - sync_to_github

include:
  - local: '.gitlab/ci/sync_to_github.yml'
